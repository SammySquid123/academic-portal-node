<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DogePortal V4 - Core</title>
    <style>
        /* Matrix Core & Doge V4 Neon Theme Alignment */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #06060c; color: #ffb700; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Tactical Navigation System Layout */
        header { background: #0c0c16; border-bottom: 2px solid #ffb700; padding: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 99; }
        .branding { font-weight: 900; font-size: 18px; color: #ffb700; text-shadow: 0 0 8px #ffb700; cursor: pointer; white-space: nowrap; }
        
        /* Multi-Tab Terminal Strip Styles */
        .tab-strip { display: flex; gap: 4px; overflow-x: auto; flex-grow: 1; margin: 0 8px; }
        .tab-strip::-webkit-scrollbar { display: none; }
        .tab { background: #121222; border: 1px solid #23233a; padding: 6px 14px; border-radius: 6px 6px 0 0; font-size: 13px; cursor: pointer; color: #8e8eaf; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .tab.active { background: #ffb700; color: #06060c; border-color: #ffb700; font-weight: 700; }
        .tab .close-btn { font-weight: bold; cursor: pointer; font-size: 11px; }
        .add-tab-btn { background: #121222; border: 1px solid #ffb700; color: #ffb700; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* Unified Address Controls */
        .nav-controls { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
        .nav-btn { background: #121222; border: 1px solid #ffb700; color: #ffb700; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .address-bar { background: #030307; border: 1px solid #ffb700; border-radius: 6px; padding: 7px 12px; color: #fff; font-size: 13px; outline: none; width: 140px; }
        @media(min-width: 500px) { .address-bar { width: 220px; } }

        /* Virtual Document Isolation Workspace */
        .viewport-container { flex-grow: 1; position: relative; background: #020205; height: calc(100vh - 52px); }
        .view-frame { width: 100%; height: 100%; border: none; background: white; display: none; }
        .view-frame.active { display: block; }

        /* Fixed Mobile iPad Flexbox Layout Dashboard */
        .home-dashboard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #090912; display: flex !important; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
        .search-box { width: 100%; max-width: 440px; background: #0f0f1f; padding: 25px; border-radius: 12px; border: 1px solid #ffb700; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .search-box h1 { font-size: 28px; margin-bottom: 6px; color: #ffb700; text-shadow: 0 0 8px #ffb700; }
        .search-box p { font-size: 12px; color: #6f6f8f; margin-bottom: 20px; font-weight: 600; }
        .search-box input { width: 100%; padding: 12px; background: #040409; border: 1px solid #ffb700; border-radius: 8px; color: #fff; font-size: 15px; outline: none; margin-bottom: 14px; text-align: center; }
        .search-box button { width: 100%; padding: 12px; background: #ffb700; color: #06060c; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="branding" onclick="goHome()">🐕 DogePortal</div>
        <div class="nav-controls">
            <button class="nav-btn" onclick="navBack()">◀</button>
            <button class="nav-btn" onclick="navForward()">▶</button>
            <button class="nav-btn" onclick="refreshTab()">↻</button>
            <button class="nav-btn" onclick="goHome()">🏠</button>
        </div>
        <div class="tab-strip" id="strip"></div>
        <button class="add-tab-btn" onclick="createTab()">+</button>
        <div class="nav-controls">
            <input type="text" class="address-bar" id="tBar" placeholder="Search or Enter URL...">
            <button class="nav-btn" onclick="launchTop()">➜</button>
        </div>
    </header>

    <div class="viewport-container" id="viewCont"></div>

    <script>
        let tabs = [];
        let activeId = null;

        function createTab() {
            const id = 't_' + Date.now();
            tabs.push({ id: id, title: 'Blank Core', url: null, isHome: true, history: [], historyIndex: -1 });
            const container = document.getElementById('viewCont');
            
            const dash = document.createElement('div');
            dash.className = 'home-dashboard';
            dash.id = 'h_' + id;
            dash.innerHTML = `
                <div class="search-box">
                    <h1>DogePortal V4</h1>
                    <p>Decentralized Navigation Terminal</p>
                    <input type="text" id="i_${id}" placeholder="Search DuckDuckGo or type link...">
                    <button onclick="mount('${id}')">Initialize Uplink</button>
                </div>
            `;
            
            const frame = document.createElement('iframe');
            frame.className = 'view-frame';
            frame.id = 'f_' + id;
            
            container.appendChild(dash);
            container.appendChild(frame);
            dash.querySelector('input').addEventListener('keypress', (e) => { if (e.key === 'Enter') mount(id); });
            switchTab(id);
        }

        function renderTabs() {
            const strip = document.getElementById('strip');
            strip.innerHTML = '';
            tabs.forEach(t => {
                const el = document.createElement('div');
                el.className = 'tab ' + (t.id === activeId ? 'active' : '');
                el.onclick = () => switchTab(t.id);
                el.innerHTML = `<span>${t.title}</span><span class="close-btn" onclick="event.stopPropagation(); closeTab('${t.id}')">×</span>`;
                strip.appendChild(el);
            });
        }

        function switchTab(id) {
            activeId = id;
            const t = tabs.find(x => x.id === id);
            
            document.querySelectorAll('.home-dashboard').forEach(el => el.style.setProperty('display', 'none', 'important'));
            document.querySelectorAll('.view-frame').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });
            
            const h = document.getElementById('h_' + id);
            const f = document.getElementById('f_' + id);
            const b = document.getElementById('tBar');
            
            if (t.isHome) {
                if (h) h.style.setProperty('display', 'flex', 'important');
                b.value = '';
            } else {
                if (h) h.style.setProperty('display', 'none', 'important');
                if (f) { f.style.display = 'block'; f.classList.add('active'); }
                b.value = t.url;
            }
            renderTabs();
        }

        function closeTab(id) {
            if (tabs.length <= 1) return;
            const idx = tabs.findIndex(x => x.id === id);
            tabs = tabs.filter(x => x.id !== id);
            document.getElementById('h_' + id)?.remove();
            document.getElementById('f_' + id)?.remove();
            if (activeId === id) activeId = tabs[idx > 0 ? idx - 1 : 0].id;
            switchTab(activeId);
        }

        function navBack() {
            const t = tabs.find(x => x.id === activeId);
            if (!t || t.isHome || t.historyIndex <= 0) return;
            t.historyIndex--; t.url = t.history[t.historyIndex];
            executeProxyLoad(activeId, t.url);
        }

        function navForward() {
            const t = tabs.find(x => x.id === activeId);
            if (!t || t.isHome || t.historyIndex >= t.history.length - 1) return;
            t.historyIndex++; t.url = t.history[t.historyIndex];
            executeProxyLoad(activeId, t.url);
        }

        function refreshTab() {
            const t = tabs.find(x => x.id === activeId);
            if (!t || t.isHome || !t.url) return;
            executeProxyLoad(activeId, t.url);
        }

        function mount(id, forcedUrl = null) {
            const input = document.getElementById('i_' + id);
            let query = forcedUrl || input.value.trim();
            if (!query) return;
            
            let url = query;
            const urlRegEx = /^(https?:\/\/)?(www\.)?([a-zA-Z0-9-]+(\.[a-zA-Z0-9-]+)+)(\/.*)?$/;
            
            if (!forcedUrl && (!urlRegEx.test(url) || url.includes(' '))) {
                url = 'https://duckduckgo.com' + encodeURIComponent(query);
            } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            const t = tabs.find(x => x.id === id);
            t.url = url; t.isHome = false;
            
            if (t.historyIndex === -1 || t.history[t.historyIndex] !== url) {
                t.history = t.history.slice(0, t.historyIndex + 1);
                t.history.push(url); t.historyIndex++;
            }

            try { t.title = new URL(url).hostname.replace('www.', ''); } catch(e) { t.title = 'Uplink'; }
            switchTab(id);
            executeProxyLoad(id, url);
        }

        function executeProxyLoad(id, targetUrl) {
            const frame = document.getElementById('f_' + id);
